version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: barberia_db
    environment:
      POSTGRES_DB: barberia
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - barberia_data:/var/lib/postgresql/data

volumes:
  barberia_data:
